<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <main>
    <div class="card-preview-container">
      <div class="card-thumbnail-container">
        <img src="/assets/images/illustration-article.svg" alt="" class="thumbnail" />
      </div>
      <div class="card-info-container">
        <div class="learning">Learning</div>
        <div class="published">Published 21 Dec 2023 </div>
        <div class="info-title">HTML & CSS foundations</div>
        <div class="info-details">These languages are the backbone of every website, defining structure, content, and
          presentation.</div>
        <div class="card-user">
          <img src="/assets/images/image-avatar.webp" alt="" class="user-pic">
          <div class="user-name">Greg Hooper</div>
        </div>
      </div>
    </div>
  </main>
  <footer>
    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. Coded by <a
        href="#">Your Name Here</a>.
  </footer>
  </div>
</body>

</html>
